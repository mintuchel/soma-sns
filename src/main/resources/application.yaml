server:
  port: 8080

spring:
  application:
    name: mini-sns
  datasource:
    url: jdbc:postgresql://localhost:5432/mini_sns
    username: mintuchel
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # 테이블이 없으면 자동으로 만들고 아니면 수정사항만 반영
      ddl-auto: update
    # JPA가 만드는 쿼리 직접 눈으로 확인하기
    show-sql: true
    properties:
      hibernate:
        format_sql: true